---
layout: default
---
<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>

  <div class="post-content">
    <div style="padding-bottom: 10px;">
      <img src={{site.url}}{{ page.image }} height="200px" style=" border-radius: 5%;">
    </div>
    {{ content }}
  </div>

</article>
